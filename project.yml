name: RestaurantPicker
options:
  bundleIdPrefix: com.restaurantpicker
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: 5.9
    DEVELOPMENT_TEAM: ""

targets:
  RestaurantPicker:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: RestaurantPicker
        excludes:
          - "Info.plist"
    info:
      path: RestaurantPicker/Info.plist
      properties:
        CFBundleDisplayName: Restaurant Picker
        CFBundleIdentifier: com.restaurantpicker.RestaurantPicker
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        UILaunchScreen: {}
        NSLocationWhenInUseUsageDescription: "We need your location to find nearby restaurants."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.restaurantpicker.RestaurantPicker
        INFOPLIST_FILE: RestaurantPicker/Info.plist

  RestaurantPickerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - RestaurantPickerTests
    dependencies:
      - target: RestaurantPicker

  RestaurantPickerUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - RestaurantPickerUITests
    dependencies:
      - target: RestaurantPicker
