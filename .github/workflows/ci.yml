name: iOS CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: SwiftFormat (lint)
        run: swiftformat --lint .

      - name: SwiftLint
        run: swiftlint lint --strict

  test:
    name: Test — ${{ matrix.device }}
    runs-on: macos-15
    needs: lint-and-format

    strategy:
      fail-fast: false
      matrix:
        include:
          - device: "iPhone 15"
            os: "18.2"
          - device: "iPhone 15 Pro"
            os: "18.2"
          - device: "iPhone 16"
            os: "18.2"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build & Test
        run: |
          xcodebuild test \
            -scheme RestaurantPicker \
            -destination 'platform=iOS Simulator,name=${{ matrix.device }},OS=${{ matrix.os }}' \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color --report junit --output test-results-${{ matrix.device }}.xml
        env:
          NSUnbufferedIO: YES

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.device }}
          path: test-results-${{ matrix.device }}.xml
          retention-days: 7
